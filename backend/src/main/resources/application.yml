spring:
  datasource:
    url: jdbc:h2:mem:atletismodb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: atletismo-super-secret-key-very-long-2026-UPDS-Santa-Cruz-Bolivia
  expiration: 86400000

server:
  port: 8080

spring:
  mail:
    host: localhost
    port: 1025
    test-connection: false
    properties:
      mail.smtp.auth: false

logging:
  level:
    com.club.atletismo: DEBUG
